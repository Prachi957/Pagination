<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Products</title>
<style>
  body { font-family: -apple-system, Arial, sans-serif; max-width: 800px; margin: 40px auto; color: #1a1a1a; }
  h1 { font-size: 20px; }
  .controls { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; }
  select, button { padding: 6px 10px; font-size: 14px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; }
  th { color: #666; font-weight: 600; }
  .muted { color: #888; font-size: 13px; }
  .row { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
  #simulateBtn { background: #f5f5f5; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; }
  #loadMoreBtn { background: #1a1a1a; color: white; border: none; border-radius: 4px; cursor: pointer; }
  #loadMoreBtn:disabled { background: #ccc; cursor: default; }
</style>
</head>
<body>

<h1>Products (newest first)</h1>

<div class="controls">
  <select id="categoryFilter">
    <option value="">All categories</option>
  </select>
  <button id="simulateBtn">Simulate 50 new products</button>
  <span id="status" class="muted"></span>
</div>

<table>
  <thead>
    <tr><th>ID</th><th>Name</th><th>Category</th><th>Price</th><th>Created</th></tr>
  </thead>
  <tbody id="productRows"></tbody>
</table>

<div class="row">
  <span id="count" class="muted"></span>
  <button id="loadMoreBtn">Load more</button>
</div>

<script>
  let cursor = null;
  let total = 0;

  const tbody = document.getElementById('productRows');
  const loadMoreBtn = document.getElementById('loadMoreBtn');
  const categoryFilter = document.getElementById('categoryFilter');
  const simulateBtn = document.getElementById('simulateBtn');
  const statusEl = document.getElementById('status');
  const countEl = document.getElementById('count');

  async function loadCategories() {
    const res = await fetch('/api/categories');
    const categories = await res.json();
    for (const c of categories) {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      categoryFilter.appendChild(opt);
    }
  }

  async function loadPage() {
    loadMoreBtn.disabled = true;
    loadMoreBtn.textContent = 'Loading...';

    const params = new URLSearchParams({ limit: 20 });
    if (cursor) params.set('cursor', cursor);
    if (categoryFilter.value) params.set('category', categoryFilter.value);

    const res = await fetch('/api/products?' + params.toString());
    const data = await res.json();

    for (const p of data.products) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${p.id}</td>
        <td>${p.name}</td>
        <td>${p.category}</td>
        <td>$${p.price}</td>
        <td>${new Date(p.created_at).toLocaleString()}</td>
      `;
      tbody.appendChild(tr);
    }

    total += data.products.length;
    countEl.textContent = total + ' products loaded';
    cursor = data.nextCursor;

    loadMoreBtn.disabled = !cursor;
    loadMoreBtn.textContent = cursor ? 'Load more' : 'No more products';
  }

  function reset() {
    cursor = null;
    total = 0;
    tbody.innerHTML = '';
    loadMoreBtn.disabled = false;
    loadPage();
  }

  categoryFilter.addEventListener('change', reset);
  loadMoreBtn.addEventListener('click', loadPage);

  simulateBtn.addEventListener('click', async () => {
    statusEl.textContent = 'Inserting...';
    const res = await fetch('/api/simulate-writes', { method: 'POST' });
    const data = await res.json();
    statusEl.textContent = data.message + ' Keep paginating below - no duplicates or gaps.';
  });

  loadCategories();
  loadPage();
</script>

</body>
</html>
